name: Hemingway
options:
  bundleIdPrefix: com.hemingway
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"

packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.0"

targets:
  Hemingway:
    type: application
    platform: macOS
    sources:
      - Hemingway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hemingway.app
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Yams
      - framework: Speech.framework
        embed: false
      - framework: AVFoundation.framework
        embed: false
    info:
      path: Hemingway/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Hemingway uses the microphone for voice dictation."
        NSSpeechRecognitionUsageDescription: "Hemingway uses on-device speech recognition to transcribe your words."
        NSHumanReadableCopyright: "Copyright © 2025"
        NSPrincipalClass: NSApplication
    entitlements:
      path: Hemingway/Hemingway.entitlements
      properties:
        com.apple.security.device.microphone: true
        com.apple.security.device.audio-input: true
